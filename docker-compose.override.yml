# Local-dev overrides: source bind mount + uvicorn --reload (single worker).
# This file is auto-loaded by `docker compose` in dev. Don't ship to prod.
services:
  app:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app/backend
    environment:
      TASKS_ENV: development
